<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tiranga Training Game</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f5f5f5;
    }
    h1 {
      margin-top: 20px;
    }
    .game-box {
      margin: 30px auto;
      width: 300px;
      padding: 20px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }
    .color-box {
      width: 100%;
      height: 100px;
      margin-bottom: 15px;
      border-radius: 8px;
    }
    button {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }
    .orange { background: orange; }
    .white { background: lightgray; }
    .green { background: green; color: white; }
    #result {
      margin-top: 15px;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>
<body>  <h1>🇮🇳 Tiranga Training Game</h1>
  <p>Guess the correct color!</p>  <div class="game-box">
    <div id="colorBox" class="color-box"></div><button class="orange" onclick="checkAnswer('orange')">Orange</button>
<button class="white" onclick="checkAnswer('white')">White</button>
<button class="green" onclick="checkAnswer('green')">Green</button>

<div id="result"></div>

  </div>  <script>
    const colors = ['orange', 'white', 'green'];
    let currentColor = '';

    function newRound() {
      currentColor = colors[Math.floor(Math.random() * colors.length)];
      document.getElementById('colorBox').style.background = currentColor;
      document.getElementById('result').innerText = '';
    }

    function checkAnswer(choice) {
      if (choice === currentColor) {
        document.getElementById('result').innerText = '✅ Correct!';
        document.getElementById('result').style.color = 'green';
      } else {
        document.getElementById('result').innerText = '❌ Wrong!';
        document.getElementById('result').style.color = 'red';
      }
      setTimeout(newRound, 1000);
    }

    newRound();
  </script></body>
</html>
